<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="fanFace">
      <circle cx="256" cy="185" r="120"/>
    </clipPath>
  </defs>

  <!-- Fan head outer shroud ring -->
  <circle cx="256" cy="185" r="145" fill="#455A64"/>
  <!-- Teal accent ring (matches the real fan's gold/teal trim ring) -->
  <circle cx="256" cy="185" r="143" fill="none" stroke="#00BCD4" stroke-width="6"/>
  <!-- Inner grill face background -->
  <circle cx="256" cy="185" r="133" fill="#263238"/>
  <!-- Grill face -->
  <circle cx="256" cy="185" r="120" fill="#37474F"/>

  <!-- Fan blades (5-blade, clipped to fan face) -->
  <g clip-path="url(#fanFace)" transform="translate(256,185)">
    <path d="M 0 0 Q -22 -52 -6 -112 Q 8 -126 26 -108 Q 42 -82 16 -46 Z" fill="#546E7A"/>
    <path d="M 0 0 Q -22 -52 -6 -112 Q 8 -126 26 -108 Q 42 -82 16 -46 Z" fill="#546E7A" transform="rotate(72)"/>
    <path d="M 0 0 Q -22 -52 -6 -112 Q 8 -126 26 -108 Q 42 -82 16 -46 Z" fill="#546E7A" transform="rotate(144)"/>
    <path d="M 0 0 Q -22 -52 -6 -112 Q 8 -126 26 -108 Q 42 -82 16 -46 Z" fill="#546E7A" transform="rotate(216)"/>
    <path d="M 0 0 Q -22 -52 -6 -112 Q 8 -126 26 -108 Q 42 -82 16 -46 Z" fill="#546E7A" transform="rotate(288)"/>
  </g>

  <!-- Grill ring overlay concentric circles -->
  <circle cx="256" cy="185" r="85"  fill="none" stroke="#455A64" stroke-width="5"/>
  <circle cx="256" cy="185" r="50"  fill="none" stroke="#455A64" stroke-width="4"/>

  <!-- Center hub -->
  <circle cx="256" cy="185" r="26" fill="#455A64"/>
  <circle cx="256" cy="185" r="14" fill="#607D8B"/>
  <circle cx="256" cy="185" r="6"  fill="#90A4AE"/>

  <!-- Grill guard outer rim -->
  <circle cx="256" cy="185" r="120" fill="none" stroke="#546E7A" stroke-width="4"/>

  <!-- Pole (thin, with teal accent stripe) -->
  <rect x="248" y="328" width="16" height="115" rx="8" fill="#455A64"/>
  <rect x="252" y="328" width="5"  height="115" rx="2.5" fill="#00BCD4" opacity="0.75"/>

  <!-- Round disc base -->
  <ellipse cx="256" cy="455" rx="125" ry="26" fill="#37474F"/>
  <ellipse cx="256" cy="450" rx="118" ry="20" fill="#455A64"/>
</svg>
